name: Release
on:
  workflow_run:
    workflows: [Publish to LuaRocks]
    types: [completed]
permissions:
  contents: write
jobs:
  release:
    name: Create Release & Cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Validate release branch
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [[ ! "$BRANCH" =~ ^release/ ]]; then
            echo "Not a release branch ($BRANCH), skipping release"
            exit 78
          fi
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Extract version
        id: version
        run: |
          RELEASE_BRANCH="${{ github.event.workflow_run.head_branch }}"
          FINAL_TAG="${RELEASE_BRANCH#release/}"
          echo "final_tag=${FINAL_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_branch=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Final tag: ${FINAL_TAG}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.final_tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.final_tag }} already exists, skipping creation"
          else
            gh release create "${{ steps.version.outputs.final_tag }}" \
              --title "${{ steps.version.outputs.final_tag }}" \
              --generate-notes \
              --latest
          fi
      - name: Merge release branch into dev
        run: |
          git fetch origin dev
          git checkout dev
          git merge origin/${{ steps.version.outputs.release_branch }} --no-edit \
            -m "Merge ${{ steps.version.outputs.release_branch }} into dev"
          git push origin dev
      - name: Delete release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin --delete "${{ steps.version.outputs.release_branch }}" || true
