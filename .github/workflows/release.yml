name: Release
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  generate-api-docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install vimcats
        run: cargo install vimcats --features=cli

      - name: Generate API docs
        run: |
          vimcats lua/gnattest/init.lua \
                   lua/gnattest/config.lua \
                   plugin/gnattest.lua > api-docs.txt

      - name: Integrate into main doc
        run: |
          # Verify CI/CD markers exist
          grep -q "<!-- CI/CD: API DOCS BEGIN -->" doc/gnattest.txt || \
            { echo "ERROR: CI/CD BEGIN marker not found"; exit 1; }
          grep -q "<!-- CI/CD: API DOCS END -->" doc/gnattest.txt || \
            { echo "ERROR: CI/CD END marker not found"; exit 1; }
          
          # Replace content between CI/CD markers
          awk '
            /<!-- CI\/CD: API DOCS BEGIN -->/ { 
              print; print ""; system("cat api-docs.txt"); print ""; skip=1; next 
            }
            /<!-- CI\/CD: API DOCS END -->/ { skip=0; print; next }
            !skip
          ' doc/gnattest.txt > doc/gnattest-new.txt
          
          # Verify FEATURES section preserved
          grep -q "FEATURES" doc/gnattest-new.txt || \
            { echo "ERROR: FEATURES section lost"; exit 1; }
          
          mv doc/gnattest-new.txt doc/gnattest.txt

      - name: Commit updated docs
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "docs: auto-update API reference for ${{ github.event.release.tag_name }} [skip ci]"
          file_pattern: doc/gnattest.txt
          skip_dirty_check: false
          branch: dev
