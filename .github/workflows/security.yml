name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:
  schedule:
    # Run security scan weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  security:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'security-scan'
          
      - name: Summary of security findings
        if: always()
        shell: bash
        run: |
          if [ -f 'trivy-results.sarif' ]; then
            echo "🔒 Security scan completed"
            echo "📄 SARIF report uploaded to Security tab"
            # Count results if jq is available
            if command -v jq &> /dev/null; then
              RESULTS=$(jq '.results | length' trivy-results.sarif 2>/dev/null || echo "0")
              echo "📊 Found $RESULTS security findings"
            fi
          else
            echo "❌ No security scan results generated"
          fi