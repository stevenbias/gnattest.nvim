name: Lint and Format

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        
      - name: Setup Lua environment
        uses: ./.github/actions/setup-lua
        with:
          lua-version: '5.1'
          cache-key-suffix: '-lint'
          
      - name: Run Luacheck
        shell: bash
        run: |
          echo "🔍 Running Luacheck..."
          luacheck --version
          luacheck --codes .
          
      - name: Check StyLua formatting
        shell: bash
        run: |
          echo "🎨 Checking StyLua formatting..."
          stylua --version
          stylua --check lua/
          
      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --verbose