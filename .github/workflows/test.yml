name: Test Suite

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_call:

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Test on Neovim ${{ matrix.neovim_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - neovim_version: 'stable'
            coverage: true
          - neovim_version: 'nightly'
            coverage: false
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacov

      - name: Run tests
        uses: nvim-neorocks/nvim-busted-action@v1
        with:
          nvim_version: ${{ matrix.neovim_version }}
          
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v5.0.0
        with:
          name: test-logs-${{ matrix.neovim_version }}
          path: |
            .busted
            luacov.stats.out
            luacov.report.out
          retention-days: 7
