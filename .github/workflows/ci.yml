name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Workflow orchestration - calls other workflows
  lint:
    name: Lint and Format
    uses: ./.github/workflows/lint.yml
    secrets: inherit
    
  test:
    name: Test Suite
    needs: lint
    uses: ./.github/workflows/test.yml
    secrets: inherit
    
  security:
    name: Security Scan
    uses: ./.github/workflows/security.yml
    secrets: inherit
    
  # Status check job
  status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: always()
    steps:
      - name: Check workflow results
        shell: bash
        run: |
          echo "🔍 Checking pipeline status..."
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          
          # Determine overall status
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ Pipeline failed"
            echo "::set-output name=status::failure"
            exit 1
          elif [[ "${{ needs.lint.result }}" == "cancelled" || "${{ needs.test.result }}" == "cancelled" || "${{ needs.security.result }}" == "cancelled" ]]; then
            echo "⏸️ Pipeline cancelled"
            echo "::set-output name=status::cancelled"
            exit 1
          else
            echo "✅ Pipeline passed"
            echo "::set-output name=status::success"
          fi
          
      - name: Create status badge
        if: success()
        shell: bash
        run: |
          echo "🏆 All checks passed!"
          echo "📊 Ready for merge"
          
      - name: Notify on failure
        if: failure()
        shell: bash
        run: |
          echo "🚨 Pipeline failed! Check the logs above."
          echo "🔧 Fix the issues and push again."