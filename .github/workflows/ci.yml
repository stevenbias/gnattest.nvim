name: CI Pipeline
on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_dispatch:
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  # Workflow orchestration - calls other workflows
  lint:
    name: Lint and Format
    uses: ./.github/workflows/lint.yml
  test:
    name: Test Suite
    needs: lint
    uses: ./.github/workflows/test.yml
  # Status check job
  status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check workflow results
        shell: bash
        run: |
          echo "🔍 Checking pipeline status..."
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"

          # Determine overall status
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ Pipeline failed"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          elif [[ "${{ needs.lint.result }}" == "cancelled" || "${{ needs.test.result }}" == "cancelled" ]]; then
            echo "⏸️ Pipeline cancelled"
            echo "status=cancelled" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ Pipeline passed"
            echo "status=success" >> $GITHUB_OUTPUT
          fi
      - name: Create status badge
        if: success()
        shell: bash
        run: |
          echo "🏆 All checks passed!"
          echo "📊 Ready for merge"
      - name: Notify on failure
        if: failure()
        shell: bash
        run: |-
          echo "🚨 Pipeline failed! Check the logs above."
          echo "🔧 Fix the issues and push again."

