name: CI
on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
permissions:
  contents: write
  checks: write
jobs:
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --color always --check lua/
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: lunarmodules/luacheck@v1
  test-matrix:
    name: Test on Neovim ${{ matrix.neovim_version }}
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - neovim_version: 'stable'
          - neovim_version: 'nightly'
    steps:
      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacov
      - uses: actions/checkout@v4
      - name: Run tests with coverage
        uses: nvim-neorocks/nvim-busted-action@v1
        env:
          GNATTEST_TEST_MODE: "1"
        with:
          nvim_version: ${{ matrix.neovim_version }}
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.neovim_version }}
          path: |-
            luacov.stats.out
            luacov.report.out
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test-matrix
    steps:
      - name: Prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacov
      - uses: actions/checkout@v4
      - name: Download stable coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-stable
      - name: Generate coverage report and check threshold
        run: |
          # Generate coverage report
          luacov

          # Display coverage summary
          echo "=== Coverage Summary ==="

          COVERAGE_LINE=$(tail -n 1 luacov.report.out)
          echo "Coverage line: $COVERAGE_LINE"

          # Parse percentage from format like "Total:       123  456   78.90%"
          # The percentage is the last field
          COVERAGE_PERCENT=$(echo "$COVERAGE_LINE" | awk '{print $NF}')
          echo "Coverage percentage: $COVERAGE_PERCENT"

          # Validate that we got a percentage
          if [[ ! "$COVERAGE_PERCENT" =~ %$ ]]; then
            echo "❌ ERROR: Could not parse coverage percentage from: $COVERAGE_LINE"
            exit 1
          fi

          # Convert to integer for comparison (remove decimal and % sign)
          COVERAGE_INT=$(echo "$COVERAGE_PERCENT" | sed 's/%.*//' | sed 's/\..*//')
          echo "Coverage as integer: $COVERAGE_INT"

          # Validate that we got a valid integer
          if ! [[ "$COVERAGE_INT" =~ ^[0-9]+$ ]]; then
            echo "❌ ERROR: Invalid coverage integer: $COVERAGE_INT"
            exit 1
          fi

          # Set minimum coverage threshold
          MIN_COVERAGE=90

          # Check if coverage meets threshold
          if [ "$COVERAGE_INT" -lt "$MIN_COVERAGE" ]; then
            echo "❌ Coverage $COVERAGE_PERCENT is below minimum threshold of $MIN_COVERAGE%"
            echo "Please add more tests to improve coverage."
            exit 1
          else
            echo "✅ Coverage $COVERAGE_PERCENT meets minimum threshold of $MIN_COVERAGE%"
          fi
      - name: Upload final coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |-
            luacov.stats.out
            luacov.report.out
  vimcats-docs:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: coverage-report
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install vimcats
        run: cargo install vimcats --features=cli
      - name: Generate API docs
        run: vimcats lua/gnattest/init.lua lua/gnattest/config.lua plugin/gnattest.lua > api-docs.txt
      - name: Integrate into main doc
        run: |
          # Create the replacement content with proper formatting
          cat > replacement.txt << 'EOF'

          ==============================================================================
          API REFERENCE                                                *gnattest-api*

          EOF

          # Append the generated API docs
          cat api-docs.txt >> replacement.txt

          # Add closing marker
          echo "" >> replacement.txt
          echo "==============================================================================" >> replacement.txt

          # Replace the API REFERENCE section in the main doc
          sed '/API REFERENCE/,/^==============================================================================$/{
            /API REFERENCE/r replacement.txt
            /API REFERENCE/,/^==============================================================================$/d
          }' doc/gnattest.txt > doc/gnattest-new.txt

          mv doc/gnattest-new.txt doc/gnattest.txt
      - name: Commit updated docs
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "docs: auto-update API reference [skip ci]"
          file_pattern: doc/gnattest.txt
          skip_dirty_check: false
