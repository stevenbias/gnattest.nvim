name: Pre-release

on:
  push:
    tags:
      - "v*-rc.*"

permissions:
  contents: write
  pull-requests: write

jobs:
  pre-release:
    name: Create Pre-release & PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract base version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          # Extract base version: v0.2.0-rc.0 → v0.2.0
          BASE_VERSION=$(echo "$TAG" | sed 's/-rc\.[0-9]*$//')
          echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_branch=release/${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG}"
          echo "Base version: ${BASE_VERSION}"
          echo "Release branch: release/${BASE_VERSION}"

      - name: Create release branch from main
        run: |
          git fetch origin main
          git checkout -b "${{ steps.version.outputs.release_branch }}" origin/main

      - name: Merge dev into release branch
        run: |
          git fetch origin dev
          git merge origin/dev --no-edit -m "Merge dev into ${{ steps.version.outputs.release_branch }}"

      - name: Push release branch
        run: |
          git push origin "${{ steps.version.outputs.release_branch }}"

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --prerelease

      - name: Open PR from release branch to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          BASE_VERSION: ${{ steps.version.outputs.base_version }}
          RELEASE_BRANCH: ${{ steps.version.outputs.release_branch }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          PR_BODY="## Release: ${BASE_VERSION}

          ### Pre-release: [${TAG_NAME}](${REPO_URL}/releases/tag/${TAG_NAME})

          ### Release process:
          1. **Approve this PR** to trigger LuaRocks publish with version \`${BASE_VERSION}\`
          2. **Merge this PR** to:
             - Create GitHub Release \`${BASE_VERSION}\`
             - Back-merge \`${RELEASE_BRANCH}\` into \`dev\`
             - Delete \`${RELEASE_BRANCH}\` branch"

          # Check if an open PR from release branch to main already exists
          EXISTING_PR=$(gh pr list \
            --base main \
            --head "$RELEASE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists — updating to match new pre-release."
            gh pr edit "$EXISTING_PR" \
              --title "Release: ${BASE_VERSION}" \
              --body "$PR_BODY"
          else
            gh pr create \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "Release: ${BASE_VERSION}" \
              --body "$PR_BODY"
          fi
